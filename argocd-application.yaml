apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-sentiment-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://localhost:3000/cisc814-gitea/team-4-gitops.git
    targetRevision: main
    path: apps/ml-sentiment-app/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true