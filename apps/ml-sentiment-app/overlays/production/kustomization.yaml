apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ../../../../monitoring
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
    target:
      kind: Rollout
      name: ml-sentiment-app
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
    target:
      kind: Rollout
      name: ml-sentiment-app
images:
  - name: registry.local:5000/ml-sentiment-app
    newTag: "d6f538af78edc743cace6328ac23fcfc6eb6621e"   