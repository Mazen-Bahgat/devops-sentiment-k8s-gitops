apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.yml
  - rollout.yaml
  - service.yaml
  - canary-service.yaml
labels:
  - pairs:
      app.kubernetes.io/name: ml-sentiment-app
      app.kubernetes.io/part-of: ml-sentiment-platform
    includeSelectors: false
    includeTemplates: true