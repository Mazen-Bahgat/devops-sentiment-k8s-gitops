apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-sentiment-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-sentiment-app
  template:
    metadata:
      labels:
        app: ml-sentiment-app
    spec:
      containers:
        - name: ml-sentiment-app
          image: registry.local:5000/ml-sentiment-app:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ml-sentiment-app-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10