apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ml-sentiment-app
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-sentiment-app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - default